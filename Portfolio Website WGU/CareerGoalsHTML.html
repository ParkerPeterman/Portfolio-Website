    <main>
<section class="contact-from">
    <h2>Get in Touch</h2>
    <p>Fill out form below with accurate information.</p>

    <form action="https://wp.zybooks.com/form-viewer.php" method="post">
        <div class="form-group">
            <label for="firstName">First Name: </label>
            <input type="text" id="firstName" name="firstName" required>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name: </label>
            <input type="text" id="lastName" name="lastName" required>
        </div>

        <div class="form-group">
            <label for="companyName">Company Name: </label>
            <input type="text" id="companyName" name="companyName">
        </div>

        <div class="form-group">
            <label for="emailAddress">Email Address: </label>
            <input type="email" id="emailAddress" name="emailAddress" required>
        </div>

        <div class="form-group">
            <label for="phoneNumber">Phone Number: </label>
            <input type="tel" id="phoneNumber" name="phoneNumber"> 
        </div>

        <div class="form-group">
            <label for="message">Message: </label>
            <textarea id="message" name="message" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label>Best Contact Time:</label><br>
            <label><input type="radio" name="contactTime" value="a.m." required> a.m.</label><br>
            <label><input type="radio" name="contactTime" value="p.m." required> p.m.</label><br>
            <label><input type="radio" name="contactTime" value="anytime" required> Anytime</label><br>
        </div>

        <div class="form-group">
            <label>Preferred Contact Method:</label>
            <select name="contactMethod" required>
                <option value="phone">Phone</option>
                <option value="email">Email</option>
                <option value="text">Text</option>
            </select>
        </div>

        <button type="submit">Submit</button>

    </form>
</section>
</main>
